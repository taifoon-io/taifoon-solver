version: '3.8'

services:
  solver:
    build:
      context: .
      dockerfile: Dockerfile.solver
    container_name: taifoon-solver
    restart: unless-stopped
    ports:
      - "8082:8082"  # Solver API
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - GENOME_SSE_URL=http://46.4.96.124:30081/api/genome/subscribe/sse
      - WARMBED_API_URL=https://api.taifoon.dev
      - MIN_PROFIT_USD=0.1
      - SIMULATION_MODE=true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8082/api/solver/stats"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: taifoon-dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - solver
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SOLVER_API_URL=/api/solver
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
